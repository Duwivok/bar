<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Мероприятия — Барный калькулятор</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Барный калькулятор">
</head>
<body>
<nav>
    <a href="index.html">Главная</a>
    <a href="recipes-v2.html">Рецепты</a>
    <a href="calculator-v2.html">Калькулятор техкарт</a>
    <a href="events-v2.html">Мероприятия</a>
    <a href="ingredients-v2.html">Номенклатура</a>
    <a href="converter-v2.html">Конвертер</a>
</nav>
<main>
    <h1>Мероприятия</h1>
    <p class="subtitle">История мероприятий. Откройте карточку, чтобы собрать барную карту и посчитать закупку/заготовки, или скопируйте похожее прошедшее мероприятие как основу для нового.</p>

    <div id="status" class="status"></div>

    <div id="eventGrid" class="recipe-grid"></div>
</main>

<button class="fab" id="addEventBtn" title="Новое мероприятие">
    <span class="fab-label">Новое мероприятие</span>
    <span class="fab-icon">+</span>
</button>

<!-- Модалка создания мероприятия (и копирования) -->
<div id="addOverlay" class="overlay hidden">
    <div class="overlay-panel">
        <div class="overlay-actions">
            <button class="overlay-close" id="addCloseBtn">Закрыть</button>
        </div>
        <h3 id="addModalTitle" style="margin-top:0;">Новое мероприятие</h3>
        <div class="form-grid">
            <div class="form-field span-2">
                <label>Название</label>
                <input type="text" id="fName" placeholder="напр. Свадьба Ивановых">
            </div>
            <div class="form-field">
                <label>Дата</label>
                <input type="date" id="fDate">
            </div>
            <div class="form-field">
                <label>Количество гостей</label>
                <input type="text" id="fGuests" inputMode="numeric">
            </div>
            <div class="form-field">
                <label>Плановый бюджет</label>
                <input type="text" id="fBudget" inputMode="decimal">
            </div>
            <div class="form-field span-2">
                <label>Комментарий</label>
                <input type="text" id="fComment">
            </div>
        </div>
        <button class="primary" id="fSaveBtn">Создать мероприятие</button>
    </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/version-toggle.js?v=3"></script>
<script src="js/events.js"></script>
<script>
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
